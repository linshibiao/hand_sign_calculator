<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤖 AI Hand-Sign Calculator 🧮</title>
    
    <!-- Load TensorFlow.js and Teachable Machine Pose library -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@latest/dist/teachablemachine-pose.min.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2rem;
            color: #00ff88;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        /* Large iPad-Friendly Calculator Screen */
        #calculator-screen {
            font-size: 2.8rem;
            background: #222;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            margin: 15px auto;
            border-radius: 15px;
            border: 4px solid #00ff88;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-wrap: break-word;
            word-break: break-all;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }

        /* Control & Camera Containers */
        #webcam-container {
            position: relative;
            margin: 15px auto;
            border: 4px solid #333;
            border-radius: 15px;
            overflow: hidden;
            width: 250px;
            height: 250px;
            background-color: #000;
        }

        /* Mirror the front camera on the iPad so it behaves like a mirror */
        canvas {
            transform: scaleX(-1);
            width: 100% !important;
            height: 100% !important;
        }

        .btn {
            font-size: 1.5rem;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #00ff88, #00b3ff);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Status label for the active AI Pose */
        #ai-status {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 10px;
            min-height: 1.5rem;
        }
    </style>
</head>
<body>

    <h1>🤖 AI Hand-Sign Calculator 🧮</h1>
    
    <!-- Giant Screen showing the math calculation -->
    <div id="calculator-screen">Press Start and Show "0"!</div>
    
    <button class="btn" type="button" onclick="init()">Start Camera</button>
    
    <div id="webcam-container"></div>
    <div id="ai-status">AI is sleeping...</div>

<script>
    // =========================================================================
    // 🌟 KIDS ZONE: PASTE YOUR TEACHABLE MACHINE POSE MODEL LINK HERE!
    // =========================================================================
    const URL = "YOUR_TEACHABLE_MACHINE_POSE_URL_HERE/"; 

    // Inside this function, match your exact Pose Class Names from Teachable Machine!
    function processKidsGameLogic(predictionName) {
        
        // 1. CLEAR action (Our two-pose motion trick)
        checkWaveMotion(predictionName);

        // 2. DIGITS: Match Class names "0" through "9"
        if (!isNaN(predictionName)) {
            handleCalculatorInput(predictionName); 
        }

        // 3. OPERATORS: Edit the right side of === to match your TM labels!
        if (predictionName === "Plus") {
            handleCalculatorInput("Plus");
        }
        if (predictionName === "Minus") {
            handleCalculatorInput("Minus");
        }
        if (predictionName === "Multiply") {
            handleCalculatorInput("Multiply");
        }
        if (predictionName === "Divide") {
            handleCalculatorInput("Divide");
        }
        if (predictionName === "Equals") {
            handleCalculatorInput("Equals");
        }
    }
    // =========================================================================
    // END OF KIDS ZONE
    // =========================================================================

    let model, webcam, ctx, labelContainer, maxPredictions;
    
    // Calculator Storage
    let currentInput = "";
    let num1 = null;
    let operator = null;
    let lastActivePose = "";

    // Wave-to-Clear Memory Setup
    let waveStage = 0; 
    function checkWaveMotion(poseName) {
        // If they tilt left...
        if (poseName === "WaveLeft") {
            waveStage = 1;
        } 
        // ...and then tilt right, clear the screen!
        else if (poseName === "WaveRight" && waveStage === 1) {
            waveStage = 0; 
            handleCalculatorInput("Clear");
            speakFeedback("Cleared!");
        }
    }

    // Initialize the Teachable Machine Pose model
    async function init() {
        const statusLabel = document.getElementById("ai-status");
        statusLabel.innerText = "Loading AI Model...";
        
        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmPose.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // WebCam Setup (Mirrored for natural physical feedback)
            const size = 250;
            const flip = true;
            webcam = new tmPose.Webcam(size, size, flip);
            await webcam.setup(); // Requests camera permission
            await webcam.play();
            
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            statusLabel.innerText = "AI is looking!";
            window.requestAnimationFrame(loop);
        } catch (error) {
            statusLabel.innerText = "Error loading model. Check link!";
            console.error(error);
        }
    }

    async function loop(timestamp) {
        webcam.update(); // Update webcam frames
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        // Run webcam framework through the model coordinates
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);

        let bestPrediction = { className: "", probability: 0 };
        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > bestPrediction.probability) {
                bestPrediction = prediction[i];
            }
        }

        const statusLabel = document.getElementById("ai-status");
        
        // Only register if AI is highly confident (95%+)
        if (bestPrediction.probability > 0.95) {
            statusLabel.innerText = `AI Sees: ${bestPrediction.className} (Confident!)`;
            
            // To prevent input spamming, only trigger once until user switches pose
            if (bestPrediction.className !== lastActivePose) {
                lastActivePose = bestPrediction.className;
                processKidsGameLogic(bestPrediction.className);
            }
        } else if (bestPrediction.probability < 0.60) {
            // User put hands down or changed pose, allow next input
            lastActivePose = "";
            statusLabel.innerText = "AI is looking...";
        }
    }

    // Handles the core calculator display processing
    function handleCalculatorInput(action) {
        const screen = document.getElementById("calculator-screen");

        if (action === "Clear") {
            currentInput = "";
            num1 = null;
            operator = null;
            screen.innerText = "0";
            return;
        }

        // Build multi-digit numbers (like "1" -> "12" -> "125")
        if (!isNaN(action)) {
            currentInput += action;
            speakFeedback(action);

            if (num1 === null) {
                screen.innerText = currentInput;
            } else {
                screen.innerText = `${num1} ${operator} ${currentInput}`;
            }
        } 
        
        // Handle Operator Input (+, -, *, /)
        else if (action === "Plus" || action === "Minus" || action === "Multiply" || action === "Divide") {
            if (currentInput !== "") {
                num1 = parseFloat(currentInput);
                currentInput = "";
            }
            if (num1 !== null) {
                operator = action === "Plus" ? "+" : action === "Minus" ? "-" : action === "Multiply" ? "×" : "÷";
                screen.innerText = `${num1} ${operator}`;
                speakFeedback(action);
            }
        } 
        
        // Solve equation using "=" sign
        else if (action === "Equals") {
            if (num1 !== null && operator !== null && currentInput !== "") {
                let num2 = parseFloat(currentInput);
                let result = 0;
                let spokenOperator = "";

                if (operator === "+") {
                    result = num1 + num2;
                    spokenOperator = "plus";
                } else if (operator === "-") {
                    result = num1 - num2;
                    spokenOperator = "minus";
                } else if (operator === "×") {
                    result = num1 * num2;
                    spokenOperator = "times";
                } else if (operator === "÷") {
                    result = num2 !== 0 ? (num1 / num2) : "Error";
                    spokenOperator = "divided by";
                }

                // Format decimals cleanly for float division
                if (typeof result === "number" && !Number.isInteger(result)) {
                    result = parseFloat(result.toFixed(2));
                }

                // Update physical display
                screen.innerText = `${num1} ${operator} ${num2} = ${result}`;
                
                // Speak out the entire mathematical formula!
                if (result === "Error") {
                    speakFeedback(`${num1} ${spokenOperator} 0 is an Error. You cannot divide by zero!`);
                } else {
                    speakFeedback(`${num1} ${spokenOperator} ${num2} equals ${result}`);
                }

                // Prime the result to continue calculating with subsequent signs
                num1 = typeof result === "number" ? result : null;
                currentInput = "";
                operator = null;
            }
        }
    }

    // iPad Voice Synthesis to read out calculations!
    function speakFeedback(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // Stop any current speaking
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0; // Normal rate so children can hear clearly
            window.speechSynthesis.speak(utterance);
        }
    }
</script>
</body>
</html>
