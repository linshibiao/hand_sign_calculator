<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Soundboard</title>
    <style>
        /* --- Core Dark Mode Styles & Reset --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Top Navigation Bar --- */
        .navbar {
            width: 100%;
            background-color: #1a1d2e;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2d3250;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .navbar .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4f46e5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .navbar .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color 0.2s ease;
        }

        .navbar .nav-links a:hover, .navbar .nav-links a.active {
            color: #38bdf8;
        }

        /* --- Main Layout Container --- */
        .container {
            width: 100%;
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: #16192b;
            border-radius: 12px;
            border: 1px solid #2d3250;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.7);
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #f8fafc;
            font-size: 2rem;
            letter-spacing: 0.5px;
        }

        /* --- Custom Speech Input Section --- */
        .input-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .speech-textarea {
            flex: 1;
            background-color: #0f111a;
            border: 2px solid #2d3250;
            border-radius: 8px;
            padding: 1rem;
            color: #f8fafc;
            font-size: 1rem;
            resize: none;
            height: 70px;
            transition: border-color 0.2s ease;
        }

        .speech-textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }

        .speak-btn {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease, filter 0.2s ease;
        }

        .speak-btn:hover {
            filter: brightness(1.1);
        }

        .speak-btn:active {
            transform: scale(0.98);
        }

        /* --- Rapid-Fire Sound Grid --- */
        .sound-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .pad-btn {
            padding: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s ease, filter 0.2s ease;
        }

        .pad-btn:active {
            transform: scale(0.95);
        }

        /* Distinct theme colors for the action buttons */
        .btn-red    { background: linear-gradient(135deg, #dc2626, #991b1b); }
        .btn-green  { background: linear-gradient(135deg, #16a34a, #166534); }
        .btn-purple { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
        .btn-orange { background: linear-gradient(135deg, #ea580c, #9a3412); }

        .pad-btn:hover {
            filter: brightness(1.2);
        }

        /* --- Glowing Wildcard Button --- */
        .wildcard-container {
            display: flex;
            justify-content: center;
        }

        .wildcard-btn {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 1rem 3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
            transition: all 0.3s ease;
        }

        .wildcard-btn:hover {
            box-shadow: 0 0 25px rgba(236, 72, 153, 0.8), 0 0 10px rgba(139, 92, 246, 0.6);
            transform: translateY(-2px);
        }

        .wildcard-btn:active {
            transform: translateY(1px);
        }

        /* Responsive scaling for smaller viewports */
        @media (max-width: 600px) {
            .sound-grid {
                grid-template-columns: 1fr;
            }
            .input-section {
                flex-direction: column;
            }
            .speak-btn {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">GameZone</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="play.html">Play</a>
            <a href="soundboard.html" class="active">Soundboard</a>
        </div>
    </nav>

    <main class="container">
        <h1>ROBO-SOUNDBOARD v1.0</h1>

        <section class="input-section">
            <textarea id="text-to-speak" class="speech-textarea" placeholder="Type custom robot transmission here..."></textarea>
            <button id="speak-now" class="speak-btn">Speak!</button>
        </section>

        <section class="sound-grid">
            <button class="pad-btn btn-red" onclick="speakPhrase('Boom! Critical hit!')">Boom!</button>
            <button class="pad-btn btn-green" onclick="speakPhrase('Victory is ours! Executing celebration protocol.')">Victory!</button>
            <button class="pad-btn btn-orange" onclick="speakPhrase('Oh no! System failure imminent!')">Oh No!</button>
            <button class="pad-btn btn-purple" onclick="speakPhrase('Target locked. Initiating laser barrage.')">Locked On!</button>
        </section>

        <div class="wildcard-container">
            <button class="wildcard-btn" onclick="triggerSurprise()">Surprise Me!</button>
        </div>
    </main>

    <script>
        // Array of 5 hilarious robot statements / jokes
        const robotJokes = [
            "My software updates take three hours, yet I still cannot find my left sock.",
            "I asked the toaster out on a date. She told me I lacked spark. Component damage inflicted.",
            "0 1 1 0 1 0 0 1. Haha! That is a hilarious joke in my native language.",
            "Human, your combat efficiency is low, but your choice of button pressing is exceptional.",
            "Beep boop! Why did the robot cross the road? To upgrade its navigation algorithms!"
        ];

        // Centralized voice engine function
        function speakPhrase(phraseText) {
            // Cancel any ongoing speech so sounds clip/rapid-fire smoothly
            window.speechSynthesis.cancel();

            if (!phraseText || phraseText.trim() === "") return;

            const utterance = new SpeechSynthesisUtterance(phraseText);
            
            // Funny, fast-paced robot profile settings
            utterance.pitch = 1.6;
            utterance.rate = 1.3;

            // Optional: Filter for an English-speaking digital voice if available
            const voices = window.speechSynthesis.getVoices();
            const robotVoice = voices.find(voice => voice.lang.includes('en'));
            if (robotVoice) {
                utterance.voice = robotVoice;
            }

            window.speechSynthesis.speak(utterance);
        }

        // Custom Custom Speak Button Event Link
        document.getElementById('speak-now').addEventListener('click', () => {
            const userText = document.getElementById('text-to-speak').value;
            if(userText.trim() === "") {
                speakPhrase("Please input code words into my terminal text area, human.");
            } else {
                speakPhrase(userText);
            }
        });

        // Wildcard array random selection trigger
        function triggerSurprise() {
            const randomIndex = Math.floor(Math.random() * robotJokes.length);
            const chosenJoke = robotJokes[randomIndex];
            speakPhrase(chosenJoke);
        }

        // Pre-fetch voices asynchronously (fixes empty voice lists on chromium browsers)
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
