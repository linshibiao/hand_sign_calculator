<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Game Show - Coding Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Reset & CSS Variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #0d0e12;
            --card-bg: #161922;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --accent-glow: rgba(0, 242, 254, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Background Decorative Glows */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.1) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.08) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            z-index: 0;
        }

        /* Centered Main Container Box */
        .container {
            background-color: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 
                        0 0 50px var(--accent-glow);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 550px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 1;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 
                        0 0 60px rgba(0, 242, 254, 0.25);
        }

        /* Typography Styles */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        /* Interactive Element Placeholder */
        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: var(--primary-neon);
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Sticky / Bottom Footer */
        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #4b5563;
            letter-spacing: 0.5px;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="margin-bottom: 1rem;">
            <span class="badge">Project Hub</span>
        </div>
        <h1>Welcome to Magic Game Show</h1>
        <p>This is my master coding hub, where game logic, creative design, and powerful code come together. Explore my latest features, mechanics, and builds all deployed right here.</p>
    </div>

    <footer>
        Created by FlashHoops kids in 2026
    </footer>

</body>
</html>
